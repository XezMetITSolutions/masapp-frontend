[build]
  publish = "out"
  command = "npm run build"

# Ana domain yönlendirmeleri
[[redirects]]
  from = "https://guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "https://www.guzellestir.com/*"
  to = "/:splat"
  status = 200

# Admin subdomain - admin paneli için
[[redirects]]
  from = "https://admin.guzellestir.com/"
  to = "/admin/dashboard"
  status = 200

[[redirects]]
  from = "https://admin.guzellestir.com/*"
  to = "/admin/:splat"
  status = 200

# Restoran subdomain'leri (wildcard)
[[redirects]]
  from = "https://*.guzellestir.com/*"
  to = "/:splat"
  status = 200

# HTTP'den HTTPS'e yönlendirme
[[redirects]]
  from = "http://admin.guzellestir.com/*"
  to = "https://admin.guzellestir.com/:splat"
  status = 301

[[redirects]]
  from = "http://*.guzellestir.com/*"
  to = "https://:splat"
  status = 301

# Fallback - tüm istekleri ana sayfaya yönlendir
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"