[build]
  publish = "out"
  command = "npm run build"

[[redirects]]
  from = "https://guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "https://www.guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "https://admin.guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "https://*.guzellestir.com/*"
  to = "/:splat"
  status = 200

# Geçici subdomain yönlendirmeleri
[[redirects]]
  from = "https://admin.guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "https://kardesler.guzellestir.com/*"
  to = "/:splat"
  status = 200

# HTTP'den HTTPS'e yönlendirme
[[redirects]]
  from = "http://admin.guzellestir.com/*"
  to = "https://admin.guzellestir.com/:splat"
  status = 301

[[redirects]]
  from = "http://kardesler.guzellestir.com/*"
  to = "https://kardesler.guzellestir.com/:splat"
  status = 301

# Tüm subdomain'ler için genel yönlendirme
[[redirects]]
  from = "https://*.guzellestir.com/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"